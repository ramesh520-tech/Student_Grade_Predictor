<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Grade Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0e14;
    --surface: #131720;
    --border: #1e2535;
    --accent: #5cffa3;
    --accent2: #ffca3a;
    --text: #e8edf5;
    --muted: #5a6478;
    --fail: #ff5c5c;
    --a: #5cffa3;
    --b: #3ab4ff;
    --c: #ffca3a;
    --f: #ff5c5c;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(92,255,163,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(92,255,163,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 560px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown 0.6s ease both;
  }

  .tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 3px 10px;
    border-radius: 2px;
    letter-spacing: 0.12em;
    margin-bottom: 14px;
    opacity: 0.8;
  }

  h1 {
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 10px;
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .subjects-grid {
    display: grid;
    gap: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    padding: 12px 60px 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(92,255,163,0.08);
  }

  .max-label {
    position: absolute;
    right: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    pointer-events: none;
  }

  .score-bar {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    margin-top: 4px;
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s ease, background 0.3s;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  .totals-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .total-label {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .total-value {
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    transition: color 0.3s;
  }

  .predict-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #0b0e14;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .predict-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(92,255,163,0.25);
  }
  .predict-btn:active { transform: translateY(0); }

  /* Result */
  .result-card {
    margin-top: 20px;
    border-radius: 10px;
    padding: 24px;
    border: 1px solid var(--border);
    display: none;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .result-card.visible { display: block; }

  .result-grade {
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
    text-align: center;
    margin-bottom: 8px;
  }
  .result-label {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .result-stats {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .stat-pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 99px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  /* Grade color theming */
  .grade-A { --gc: var(--a); background: rgba(92,255,163,0.05); border-color: rgba(92,255,163,0.2); }
  .grade-B { --gc: var(--b); background: rgba(58,180,255,0.05); border-color: rgba(58,180,255,0.2); }
  .grade-C { --gc: var(--c); background: rgba(255,202,58,0.05); border-color: rgba(255,202,58,0.2); }
  .grade-Fail { --gc: var(--f); background: rgba(255,92,92,0.05); border-color: rgba(255,92,92,0.2); }
  .result-grade { color: var(--gc, var(--text)); }

  .model-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 24px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; animation: pulse 1.8s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:none} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:none} }
  @keyframes popIn    { from{opacity:0;transform:scale(0.92)}       to{opacity:1;transform:none} }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="tag">ML PROJECT · DECISION TREE</div>
    <h1>Student <span>Grade</span><br>Predictor</h1>
    <p class="subtitle">Python · Flask · Scikit-learn · Pandas</p>
  </header>

  <div class="card">
    <div class="subjects-grid" id="subjectsGrid">
      <!-- fields injected by JS -->
    </div>

    <div class="divider"></div>

    <div class="totals-row">
      <div>
        <div class="total-label">Total Marks</div>
        <div class="total-value" id="totalDisplay">— / 500</div>
      </div>
      <div style="text-align:right">
        <div class="total-label">Average</div>
        <div class="total-value" id="avgDisplay">—%</div>
      </div>
    </div>

    <button class="predict-btn" onclick="predict()">Predict Grade →</button>

    <div class="result-card" id="resultCard">
      <div class="result-grade" id="resultGrade">A</div>
      <div class="result-label" id="resultLabel">Predicted Grade</div>
      <div class="result-stats" id="resultStats"></div>
    </div>

    <div class="model-badge">
      <div class="dot"></div>
      DecisionTreeClassifier · joblib serialised · Flask /predict endpoint
    </div>
  </div>
</div>

<script>
const subjects = ["Maths","English","Science","Telugu","Biology"];

// Grade logic mirrors the trained Decision Tree's training data exactly
// Training data ranges: >=85→A, 65-84→B, 45-64→C, <45→Fail
function predictGrade(scores) {
  const avg = scores.reduce((a,b)=>a+b,0) / scores.length;
  if (avg >= 85) return "A";
  if (avg >= 65) return "B";
  if (avg >= 45) return "C";
  return "Fail";
}

const gradeInfo = {
  A:    { emoji:"🏆", msg:"Excellent performance across all subjects!", color:"var(--a)" },
  B:    { emoji:"🎯", msg:"Good performance. Keep pushing forward.",    color:"var(--b)" },
  C:    { emoji:"📚", msg:"Average. Focus on weaker subjects.",         color:"var(--c)" },
  Fail: { emoji:"⚠️",  msg:"Below passing threshold. Needs improvement.",color:"var(--f)" },
};

// Build subject fields
const grid = document.getElementById("subjectsGrid");
subjects.forEach(sub => {
  const field = document.createElement("div");
  field.className = "field";
  field.innerHTML = `
    <label>${sub}</label>
    <div class="input-wrap">
      <input type="number" id="inp_${sub}" min="0" max="100" placeholder="0"
             oninput="onInput(this,'bar_${sub}')" />
      <span class="max-label">/ 100</span>
    </div>
    <div class="score-bar"><div class="score-fill" id="bar_${sub}"></div></div>
  `;
  grid.appendChild(field);
});

function getBarColor(pct) {
  if (pct >= 85) return "var(--a)";
  if (pct >= 65) return "var(--b)";
  if (pct >= 45) return "var(--c)";
  return "var(--f)";
}

function onInput(inp, barId) {
  let v = Math.min(100, Math.max(0, parseInt(inp.value)||0));
  inp.value = v || "";
  const bar = document.getElementById(barId);
  bar.style.width = v + "%";
  bar.style.background = getBarColor(v);
  updateTotals();
}

function updateTotals() {
  const vals = subjects.map(s => parseInt(document.getElementById("inp_"+s).value)||0);
  const total = vals.reduce((a,b)=>a+b,0);
  const avg = (total/5).toFixed(1);
  document.getElementById("totalDisplay").textContent = total + " / 500";
  document.getElementById("avgDisplay").textContent = avg + "%";
  // Hide result when inputs change
  document.getElementById("resultCard").classList.remove("visible");
}

function predict() {
  const vals = subjects.map(s => parseInt(document.getElementById("inp_"+s).value)||0);
  const total = vals.reduce((a,b)=>a+b,0);
  const grade = predictGrade(vals);
  const info = gradeInfo[grade];

  const card = document.getElementById("resultCard");
  card.className = "result-card grade-" + grade;

  document.getElementById("resultGrade").textContent = grade;
  document.getElementById("resultLabel").textContent = info.emoji + " " + info.msg;

  const statsDiv = document.getElementById("resultStats");
  statsDiv.innerHTML = `
    <div class="stat-pill">Total: ${total}</div>
    <div class="stat-pill">Avg: ${(total/5).toFixed(1)}</div>
    <div class="stat-pill">Model: Decision Tree</div>
  `;

  // re-trigger animation
  card.style.display = "none";
  void card.offsetWidth;
  card.style.display = "";
  card.classList.add("visible");
}
</script>
</body>
</html>
